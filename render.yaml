services:
  - type: web
    name: iptv-manager
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter

    # ── Persistent disk for DB + HLS segments ─────────────────────────────────
    disk:
      name: iptv-data
      mountPath: /data
      sizeGB: 5

    # ── Environment variables ──────────────────────────────────────────────────
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: DB_FILE
        value: /data/db/db.json
      - key: OUTPUT_DIR
        value: /data/hls-output
      - key: VIDEO_CODEC
        value: copy
      - key: AUDIO_CODEC
        value: copy
      - key: HLS_SEGMENT_TIME
        value: "4"
      - key: HLS_LIST_SIZE
        value: "6"
      - key: HW_ACCEL
        value: none
      - key: CLEARKEY_PAIRS
        value: ""
      - key: API_KEY
        generateValue: true

    # ── Health check ───────────────────────────────────────────────────────────
    healthCheckPath: /health
