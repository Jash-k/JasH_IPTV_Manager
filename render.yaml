services:
  - type: web
    name: iptv-manager
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free

    # Persistent disk — db.json survives redeploys
    disk:
      name: iptv-data
      mountPath: /data
      sizeGB: 1

    envVars:
      # Server ports
      - key: PORT
        value: "10000"
      - key: HLS_PORT
        value: "10001"

      # Environment
      - key: NODE_ENV
        value: production

      # DB path on persistent disk
      - key: DB_FILE
        value: /data/db/db.json

      # API key — auto-generated by Render
      - key: API_KEY
        generateValue: true

      # Render external URL for keepalive
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: iptv-manager
          type: web
          property: host

      # ── Supabase (set these in Render dashboard) ────────────────────────────
      # Frontend (baked into React bundle at build time)
      - key: VITE_SUPABASE_URL
        sync: false   # set manually in Render dashboard
      - key: VITE_SUPABASE_ANON_KEY
        sync: false   # set manually in Render dashboard

      # Backend (runtime env for server.cjs)
      - key: SUPABASE_URL
        sync: false   # set manually in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false   # set manually in Render dashboard

    healthCheckPath: /health
