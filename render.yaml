services:
  - type: web
    name: iptv-manager
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free

    disk:
      name: iptv-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: PORT
        value: "10000"
      - key: HLS_PORT
        value: "10001"
      - key: NODE_ENV
        value: production
      - key: DB_FILE
        value: /data/db/db.json
      - key: API_KEY
        generateValue: true
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: iptv-manager
          type: web
          property: host

    healthCheckPath: /health
